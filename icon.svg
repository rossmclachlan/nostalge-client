  <!-- Grooves -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#28254a" stroke-width="1"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#2a2750" stroke-width="0.7"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#28254a" stroke-width="1"/>
  <circle cx="256" cy="256" r="165" fill="none" stroke="#2a2750" stroke-width="0.7"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#28254a" stroke-width="1"/>
  <circle cx="256" cy="256" r="135" fill="none" stroke="#2a2750" stroke-width="0.7"/>
